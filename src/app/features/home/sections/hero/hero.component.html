<section class="hero" aria-label="Introduction">
  <!-- Animated background -->
  <div class="hero__bg" aria-hidden="true">
    <div class="hero__blob hero__blob--blue"></div>
    <div class="hero__blob hero__blob--purple"></div>
    <div class="hero__blob hero__blob--pink"></div>
    <div class="hero__grid"></div>
    <div class="hero__noise"></div>
  </div>

  <div class="hero__container">
    <!-- Left: Content -->
    <div class="hero__content" [class.hero__content--visible]="visible()">

      <!-- Availability badge -->
      <div class="hero__availability animate-fade-in stagger-1">
        <span class="hero__availability-dot" aria-hidden="true"></span>
        <span>{{ personal().availability }}</span>
      </div>

      <!-- Title -->
      <h1 class="hero__title animate-blur-reveal stagger-2">
        <span class="hero__title-line">Software</span>
        <span class="hero__title-line hero__title-line--accent">Engineer</span>
      </h1>

      <!-- Rotating subtitle -->
      <div class="hero__subtitle animate-fade-in-up stagger-3" aria-live="polite">
        <span class="hero__subtitle-text">{{ personal().titles[currentTitleIndex()] }}</span>
      </div>

      <!-- Description -->
      <p class="hero__description animate-fade-in-up stagger-4">
        {{ personal().summary }}
      </p>

      <!-- Technology badges -->
      <div class="hero__tech animate-fade-in-up stagger-5" aria-label="Technologies">
        @for (tech of technologies; track tech) {
          <app-badge variant="default" size="md">{{ tech }}</app-badge>
        }
      </div>

      <!-- CTA Buttons -->
      <div class="hero__actions animate-fade-in-up stagger-6">
        <button class="hero__btn hero__btn--primary" (click)="scrollToProjects()"
                aria-label="View my engineering work">
          <span>View My Work</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <button class="hero__btn hero__btn--secondary" (click)="openResume()"
                aria-label="Open resume in new tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>Resume</span>
        </button>
      </div>

      <!-- Social Links -->
      <div class="hero__social animate-fade-in stagger-7">
        <button class="hero__social-link" (click)="openLink(personal().github)"
                aria-label="Visit GitHub profile">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
        </button>

        <button class="hero__social-link" (click)="openLink(personal().linkedin)"
                aria-label="Visit LinkedIn profile">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </button>

        <button class="hero__social-link" (click)="openLink('mailto:' + personal().email)"
                aria-label="Send email">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Right: Portrait + Stats -->
    <div class="hero__visual animate-fade-in stagger-3">
      <!-- Portrait card -->
      <div class="hero__portrait-card">
        <div class="hero__portrait-ring" aria-hidden="true"></div>
        <div class="hero__portrait-img">
          <img
            ngSrc="/images/hero-portrait.jpg"
            alt="Gurusudhan V"
            fill
            priority
            class="hero__portrait-photo" />
        </div>
        <!-- Floating badge -->
        <div class="hero__portrait-badge" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>Open to Work</span>
        </div>
      </div>

      <!-- Stats grid -->
      <div class="hero__stats" role="list">
        @for (stat of stats(); track stat.label) {
          <div class="hero__stat" role="listitem">
            <span class="hero__stat-value">{{ stat.value }}{{ stat.suffix }}</span>
            <span class="hero__stat-label">{{ stat.label }}</span>
          </div>
        }
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="hero__scroll-indicator" aria-hidden="true">
    <div class="hero__scroll-line"></div>
    <span>Scroll</span>
  </div>
</section>
